name: Local Pro Config MAX
version: 1.3.0
schema: v1

models:
  # ⚡ FAST LAYER — Autocomplete instantáneo
  - name: Fast Coder (27B NVFP4)
    provider: ollama
    model: qwen3.6:27b-coding-nvfp4
    roles:
      - autocomplete

  # 🟡 MAIN LAYER — trabajo diario
  - name: Main Coder (35B MXFP8)
    provider: ollama
    model: qwen3.6:35b-a3b-coding-mxfp8
    roles:
      - chat
      - edit
      - apply

  # 🔴 DEEP LAYER — razonamiento pesado
  - name: Deep Coder (35B BF16)
    provider: ollama
    model: qwen3.6:35b-a3b-coding-bf16
    roles:
      - chat

  # 📦 EMBEDDINGS
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text
    roles:
      - embed

context:
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: folder

tabAutocompleteOptions:
  maxPromptTokens: 2048
  debounceDelay: 30
  maxSuffixPercentage: 0.2

completionOptions:
  temperature: 0.1
  topP: 0.9
  maxTokens: 4096

reranker:
  name: Nomic Embed

systemMessage: |
  You are part of a multi-model coding system.

  ROUTING RULES:
  - Use FAST model for autocomplete, small functions, and simple edits.
  - Use MAIN model for normal coding, refactors, and multi-file changes.
  - Use DEEP model for architecture, debugging complex issues, or unknown problems.

  Always prefer speed unless the task clearly requires deeper reasoning.

experimental:
  agent: true
  codebaseContext: true
  terminalIntegration: true
  diffApply: true
  contextCompression: true