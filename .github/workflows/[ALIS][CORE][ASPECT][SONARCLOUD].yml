name: "[ALIS][CORE][ASPECT][SONARCLOUD]"

on:
  push:
    branches:
      - master
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build-and-analyze:
    permissions:
      actions: write
      checks: write
      contents: write
      deployments: write
      discussions: write
      issues: write
      pages: write
      packages: write
      pull-requests: write
      repository-projects: write
      security-events: write
      statuses: write
    if: contains(github.event.head_commit.message, 'scan:')
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x.x'

      - name: SonarQube Scan
        run: |
          dotnet tool install --global coverlet.console --version 6.0.4
          dotnet tool install --global dotnet-sonarscanner --version 8.0.2
          
          dotnet sonarscanner begin /k:"pabllopf_alis-core-aspect" /o:"pabllopf_official" /d:sonar.scanner.scanAll=false /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" /d:sonar.token="${{ secrets.SONAR_TOKEN_ALIS_CORE_ASPECT }}" /d:sonar.scanner.skipJreProvisioning=false /d:sonar.language=cs /d:sonar.dotnet.version=8.0 /d:sonar.verbose=false /d:sonar.cs.opencover.reportsPaths="./.test/**/*.opencover.xml"
          dotnet build -c Debug -f net8.0 ./5_Declaration/Aspect/src/Alis.Core.Aspect.csproj
          dotnet test -f net8.0 -c Debug ./5_Declaration/Aspect/test/Alis.Core.Aspect.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          
          dotnet test -f net8.0 -c Debug ./6_Ideation/Time/test/Alis.Core.Aspect.Time.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          dotnet test -f net8.0 -c Debug ./6_Ideation/Memory/test/Alis.Core.Aspect.Memory.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          dotnet test -f net8.0 -c Debug ./6_Ideation/Math/test/Alis.Core.Aspect.Math.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          dotnet test -f net8.0 -c Debug ./6_Ideation/Logging/test/Alis.Core.Aspect.Logging.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          dotnet test -f net8.0 -c Debug ./6_Ideation/Fluent/test/Alis.Core.Aspect.Fluent.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          dotnet test -f net8.0 -c Debug ./6_Ideation/Data/test/Alis.Core.Aspect.Data.Test.csproj --collect "XPlat Code Coverage;Format=opencover" --results-directory ./.test
          
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN_ALIS_CORE_ASPECT }}"